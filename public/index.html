<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Survivor.io Optimization Matrix</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="utility-header">
    <section class="mode-tabs" aria-label="Scenario selector">
      <button class="mode-btn is-active" data-scenario="clan" type="button">Expedition</button>
      <button class="mode-btn" data-scenario="enders" type="button">Echo</button>
      <button class="mode-btn" data-scenario="trials" type="button">Trials</button>
    </section>

    <section class="stat-strip" aria-label="Base stats">
      <label>Base ATK<input type="number" id="base-atk" min="0" placeholder="0" class="glass-input" /></label>
      <label>Crit %<input type="number" id="crit-rate" min="0" max="100" step="0.1" class="glass-input" /></label>
      <label>Crit DMG<input type="number" id="crit-dmg" min="0" step="0.1" placeholder="100" class="glass-input" /></label>
    </section>

    <section class="share-tray" aria-label="Share configuration">
      <input type="text" id="share-string-output" readonly class="glass-input share-field" />
      <button id="btn-copy-string" class="copy-btn" type="button">Copy</button>
      <span id="copy-status" class="copy-status" aria-live="polite"></span>
    </section>
  </header>

  <main class="main-dashboard-grid">
    <aside class="dashboard-column left-column">
      <article class="panel survivor-panel">
        <div class="panel-head">
          <h3>Select Survivor</h3>
          <span id="selected-survivor-label" class="mini-badge">Master Yang</span>
        </div>
        <div id="survivor-grid" class="survivor-grid"></div>
      </article>

      <article class="panel run-panel">
        <div class="panel-head">
          <h3>Run Evolution Setup</h3>
          <span id="evo-count" class="mini-badge">0 ready</span>
        </div>
        <div id="skill-pairs" class="skill-pairs"></div>
      </article>
    </aside>

    <section class="dashboard-column center-column">
      <article class="panel equipment-panel">
        <div class="panel-head">
          <h3>Six-Slot Equipment Matrix</h3>
          <span class="mini-badge">2 × 3 grid</span>
        </div>
        <div id="equipment-grid" class="equipment-grid"></div>
      </article>
    </section>

    <aside class="dashboard-column right-column">
      <article class="panel tech-panel">
        <div class="panel-head">
          <h3>Tech Parts</h3>
          <span class="mini-badge">Priority</span>
        </div>
        <div id="tech-grid" class="tech-grid"></div>
        <button id="btn-tech-order" class="btn-secondary wide" type="button">Generate Target Priority Checklist</button>
        <div id="tech-checklist" class="collapsible-output"></div>
      </article>

      <article class="panel collectibles-panel">
        <div class="collectible-header">
          <h3>Collectibles</h3>
          <button id="tooltip-guide-trigger" class="lightbulb" type="button" aria-label="Collectible guide">💡</button>
          <div id="collectible-tooltip" class="tooltip-card" hidden>
            <strong>Store strategy</strong>
            <ul>
              <li>Prioritize damage and crit bonuses first.</li>
              <li>Finish sets only when the final piece is close.</li>
              <li>Avoid random shard spending with no breakpoint.</li>
            </ul>
          </div>
        </div>
        <div id="collectibles-grid" class="collectibles-grid"></div>
      </article>
    </aside>
  </main>

  <section class="optimization-footer">
    <div class="footer-resources">
      <label>Universal Shards<input type="number" id="core-shards-pool" class="input-large" value="0" min="0" /></label>
      <label>Stellar Cores<input type="number" id="core-stellar-pool" class="input-large" value="0" min="0" /></label>
    </div>
    <div id="exclusion-toggles" class="toggle-row"></div>
    <button id="btn-execute-optimization" class="execute-btn" type="button">RUN PERFORMANCE OPTIMIZATION MATRIX</button>
  </section>

  <section id="results-dashboard" class="results-dashboard" hidden>
    <div id="results-grid" class="results-grid"></div>
  </section>

  <script src="app.js"></script>
</body>
</html>
